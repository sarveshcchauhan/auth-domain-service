services:

  mongo:
    image: mongo:7.0.1    
    container_name: auth-mongo
    ports:
      - "27017:27017"
    # - "27018:28017"
    # Host → localhost:27018
    # Container → mongo:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: kafka_u1
      MONGO_INITDB_ROOT_PASSWORD: test123
    
    # command: >
    #   bash -c "
    #     chmod 400 /etc/mongo-keyfile &&
    #     mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
    #   "
    # command: ["--replSet", "rs0", "--bind_ip_all"]
    command: ["--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
      # - ./mongo-keyfile:/etc/mongo-keyfile
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js

  redis:
    image: redis:7
    container_name: auth-redis
    ports:
      - "6379:6379"

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: auth-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: auth-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://auth-kafka:9092
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: auth-kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: auth-zookeeper:2181
    depends_on:
      - kafka
  mailhog:
    image: mailhog/mailhog
    container_name: auth-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  auth-service:
    # build: ..
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "4000:4000"
    depends_on:
      - mongo
      - redis
      - kafka
    env_file:
      - ../.env
    restart: unless-stopped
  
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318"   # HTTP (your SDK uses this)
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"

  # email-worker:
